<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="50" cy="20" r="10" fill="#f1c27d"/>
  
  <!-- Body -->
  <rect x="45" y="30" width="10" height="30" fill="#e74c3c"/>
  
  <!-- Left Arm -->
  <line x1="45" y1="35" x2="25" y2="50" stroke="#f1c27d" stroke-width="5"/>
  
  <!-- Right Arm Holding Shoe -->
  <line x1="55" y1="35" x2="75" y2="25" stroke="#f1c27d" stroke-width="5"/>
  
  <!-- Shoe -->
  <ellipse cx="80" cy="20" rx="10" ry="5" fill="#000"/>
  
  <!-- Legs -->
  <line x1="50" y1="60" x2="35" y2="85" stroke="#2c3e50" stroke-width="6"/>
  <line x1="50" y1="60" x2="70" y2="85" stroke="#2c3e50" stroke-width="6"/>
</svg>